<!DOCTYPE html>
<html>
<head>
<title>Silence Drive Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; background:#0f2e2e; }

#map {
    position: sticky;
    top: 0;
    height: 100vh;
}

.spacer {
    height: 400vh;
}
</style>
</head>

<body>

<div id="map"></div>
<div class="spacer"></div>

<script>

// Initialize map
var map = L.map('map').setView([9.85, 76.9], 11);

// Tile
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ROUTE COORDINATES (approx — replace with accurate ones later)
const route = [
    [9.866, 76.885], // Kozhipally
    [9.850, 76.900], // Naliyani
    [9.830, 76.880], // Kanjar
    [9.820, 76.870], // Olikkayam
    [9.800, 76.860], // Ilaveezhapoonchira
    [9.790, 76.855],
    [9.780, 76.860],
    [9.770, 76.870],
    [9.760, 76.880],
    [9.850, 76.920]  // Hideout
];

// Draw route
var polyline = L.polyline(route, {color: 'lime'}).addTo(map);

// Jeep marker
var jeep = L.marker(route[0]).addTo(map);

// Scroll animation
window.addEventListener("scroll", () => {
    let progress = window.scrollY / (document.body.scrollHeight - window.innerHeight);
    let index = Math.floor(progress * (route.length - 1));
    jeep.setLatLng(route[index]);
});

</script>

</body>
</html>
