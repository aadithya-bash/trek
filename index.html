<!DOCTYPE html>
<html>
<head>
  <title>Silence Drive</title>
<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_REAL_KEY"></script>
  <style>
    body { margin:0; background:#0f2e2e; }
    #map {
      position: sticky;
      top: 0;
      height: 100vh;
    }
    .spacer {
      height: 400vh;
    }
  </style>
</head>

<body>

<div id="map"></div>
<div class="spacer"></div>

<script>
let map, routePath = [], jeepMarker;

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 12,
    center: { lat: 9.85, lng: 76.9 },
    styles: [
      { elementType: "geometry", stylers: [{ color: "#0f2e2e" }] },
      { elementType: "labels.text.fill", stylers: [{ color: "#d6f5d6" }] }
    ]
  });

  const directionsService = new google.maps.DirectionsService();

  directionsService.route({
    origin: "HideOut Cottages Kulamavu",
    destination: "HideOut Cottages Kulamavu",
    waypoints: [
      { location: "Kozhipally Idukki" },
      { location: "Naliyani Idukki" },
      { location: "Kanjar Kerala" },
      { location: "Olikkayam Waterfalls" },
      { location: "Ilaveezhapoonchira" },
      { location: "Ilaveezhapoonchira Lake" },
      { location: "S Valavu Elappally" },
      { location: "Ulupuni Idukki" },
      { location: "Triveni Moolamattom" }
    ],
    travelMode: "DRIVING"
  }, (result, status) => {

    if (status === "OK") {
      const route = result.routes[0].overview_path;

      routePath = route;

      new google.maps.Polyline({
        path: route,
        map: map,
        strokeColor: "#00ff88",
        strokeWeight: 4
      });

      jeepMarker = new google.maps.Marker({
        position: route[0],
        map: map,
        icon: {
          url: "https://img.icons8.com/emoji/48/jeep-emoji.png",
          scaledSize: new google.maps.Size(40, 40)
        }
      });
    }
  });
}

window.onload = initMap;

// SCROLL ANIMATION
window.addEventListener("scroll", () => {
  if (!routePath.length) return;

  let progress = window.scrollY / (document.body.scrollHeight - window.innerHeight);

  let index = Math.floor(progress * (routePath.length - 1));

  jeepMarker.setPosition(routePath[index]);

  map.panTo(routePath[index]);
});
</script>

</body>
</html>
